<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Project Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" type="text/css" href="stylesheets/projects.css">
    <link rel="stylesheet" type="text/css" href="stylesheets/project-detail.css">
    <script src="scripts/theme-toggle.js"></script>
    <link rel="stylesheet" type="text/css" href="stylesheets/theme-toggle.css">
    <link rel="stylesheet" type="text/css" href="stylesheets/action-loader.css">

    <!-- Code snippet syntax highlighting -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>

<body class="is-loading">
    <div class="navbar">
        <a href="#" class="sitename"><span class="red-text">Bennies</span>lab</a>
        <nav>
            <a href="index.html"><img src="src/home.png" alt="Home"><span class="nav-label">Home</span></a>
            <a href="projects.html"><img src="src/folder.png" alt="Projects"><span class="nav-label">Projects</span></a>
            <a href="blogs.html"><img src="src/pen.png" alt="Blogs"><span class="nav-label">Blog</span></a>
            <a href="profile.html"><img src="src/cv.png" alt="Profile"><span class="nav-label">Profile</span></a>
        </nav>
        <div class="theme-toggle-wrapper">
            <button class="theme-toggle" type="button" aria-label="Switch to dark theme" aria-pressed="false">
                <span class="theme-toggle__icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="4"></circle>
                        <path d="M12 2v2"></path>
                        <path d="M12 20v2"></path>
                        <path d="m4.93 4.93 1.41 1.41"></path>
                        <path d="m17.66 17.66 1.41 1.41"></path>
                        <path d="M2 12h2"></path>
                        <path d="M20 12h2"></path>
                        <path d="m6.34 17.66-1.41 1.41"></path>
                        <path d="m19.07 4.93-1.41 1.41"></path>
                    </svg>
                </span>
                <span class="theme-toggle__icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M12 3a6 6 0 0 0 9 7.5A9 9 0 1 1 12 3Z"></path>
                    </svg>
                </span>
            </button>
        </div>
    </div>

    <div class="detail-loading" role="status" aria-label="Loading project">
        <span class="action-loader action-loader--block"></span>
    </div>

    <main class="project-detail-main">

        <aside class="detail-skills-sidebar" id="projectSkillsSidebar" aria-label="Skills used in this project">
            <h2 class="skills-sidebar-heading">Skills</h2>
            <div class="skills-sidebar-list" id="projectSkillsList">
                <!-- skill chips injected by JS -->
            </div>
        </aside>

        <!-- right-pane placeholder: invisible today (0px column), add content + bump width later -->
        <aside class="detail-sidebar-right" aria-hidden="true"></aside>

        <div class="project-container">
            <h1 class="project-detail-title">Loading...</h1>

            <div class="project-detail-thumbnail-container">
                <img id="projectDetailThumbnail" src="" alt="Project Thumbnail" style="display:none;">
            </div>

            <div class="project-meta project-properties">
                <div class="project-property-row">
                    <span class="project-property-label">Category</span>
                    <span class="category project-property-value">Category</span>
                </div>
                <div class="project-property-row project-github-row" hidden>
                    <span class="project-property-label">GitHub</span>
                    <a class="github-url project-property-value" href="#" target="_blank" rel="noopener noreferrer"></a>
                </div>
                <div class="project-property-row">
                    <span class="project-property-label">Posted</span>
                    <span class="date-posted project-property-value">Loading...</span>
                </div>
                <div class="project-property-row">
                    <span class="project-property-label">Updated</span>
                    <span class="last-updated project-property-value">Loading...</span>
                </div>
            </div>
            <div class="project-content-rendered">
                <p>Loading project content...</p>
            </div>
        </div>

    </main>

    <footer>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
    <script src="scripts/project-detail.js"></script>
</body>

</html>
