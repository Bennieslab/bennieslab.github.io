<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Blog Post</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" type="text/css" href="stylesheets/blogs.css">
    <link rel="stylesheet" type="text/css" href="stylesheets/blog-post-detail.css">
    <script src="scripts/theme-toggle.js"></script>
    <link rel="stylesheet" type="text/css" href="stylesheets/theme-toggle.css">
</head>
<body>
    <div class="navbar">
        <a href="#" class="sitename"><span class="red-text">Bennies</span>lab</a>
        <nav>
            <a href="index.html"><img src="src/home.png" alt="Home"><span class="nav-label">Home</span></a>
            <a href="projects.html"><img src="src/folder.png" alt="Projects"><span class="nav-label">Projects</span></a>
            <a href="blogs.html"><img src="src/pen.png" alt="Blogs"><span class="nav-label">Blog</span></a>
            <a href="profile.html"><img src="src/cv.png" alt="Profile"><span class="nav-label">Profile</span></a>
        </nav>
        <div class="theme-toggle-wrapper">
    <button class="theme-toggle" type="button" aria-label="Switch to dark theme" aria-pressed="false">
        <span class="theme-toggle__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>
        </span>
        <span class="theme-toggle__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 7.5A9 9 0 1 1 12 3Z"></path></svg>
        </span>
    </button>
</div>
    </div>

    <main class="post-detail-main">

        <aside class="detail-skills-sidebar" id="postSkillsSidebar" aria-label="Skills used in this post">
            <h2 class="skills-sidebar-heading">Skills</h2>
            <div class="skills-sidebar-list" id="postSkillsList">
                <!-- skill chips injected by JS -->
            </div>
        </aside>

        <!-- right-pane placeholder: invisible today (0px column), add content + bump width later -->
        <aside class="detail-sidebar-right" aria-hidden="true"></aside>

        <div class="post-container">
            <div class="post-detail-thumbnail-container">
                <img id="postDetailThumbnail" src="" alt="Post Thumbnail" style="display:none;">
            </div>

            <h1 class="post-detail-title">Loading...</h1>
            <div class="post-meta">
                <span class="category">Category</span>
                <span class="date-posted">Posted: Loading...</span>
                <br>
                <span class="last-updated">Last Updated: Loading...</span>
            </div>
            <div class="post-content-rendered">
                <p>Loading post content...</p>
            </div>
        </div>

    </main>

    <footer>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
    <script src="scripts/blog-post-detail.js"></script>
</body>
</html>
